<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Rounded container representing high-end engineering/minimalism -->
  <rect width="512" height="512" rx="120" fill="#1a1814" />
  
  <!-- Subtle line or frame element representing quality control grid -->
  <rect x="24" y="24" width="464" height="464" rx="96" fill="none" stroke="#c84b1a" stroke-width="8" opacity="0.3" />
  
  <!-- Main initials -->
  <text x="50%" y="56%" font-family="'Syne', 'Inter', sans-serif" font-size="220" font-weight="700" fill="#fdfcf8" dominant-baseline="middle" text-anchor="middle" letter-spacing="-5">GC</text>
  
  <!-- An accent dot representing target/quality/processes -->
  <circle cx="390" cy="360" r="30" fill="#c84b1a" />
</svg>
